<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BlindBox CSV 导入</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">AstrBot Plugin Dashboard</p>
          <h1>BlindBox CSV 自动导入</h1>
          <p class="lead">上传 CSV 文件，一键导入盲盒任务数据。导入后将在后台进行确认微调。</p>
        </div>
        <div class="hero-card">
          <div class="hero-card-title">导入状态</div>
          <div id="stats" class="stats">
            <div class="stat">
              <span class="stat-label">待导入</span>
              <span class="stat-value" id="pending-count">0</span>
            </div>
            <div class="stat">
              <span class="stat-label">已导入</span>
              <span class="stat-value" id="imported-count">0</span>
            </div>
          </div>
          <div class="hero-card-actions">
            <button id="refreshBtn" class="secondary">刷新状态</button>
          </div>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>上传 CSV 文件</h2>
          </div>
          <form id="uploadForm" class="form-grid">
            <label class="full">
              <span>选择 CSV 文件</span>
              <input id="csvFileInput" type="file" accept=".csv" required />
              <small>支持 .csv 格式文件，包含 category（类别）、title（任务）、points（积分）、enabled（启用）列</small>
            </label>
            <div class="form-actions">
              <button type="submit" id="uploadBtn">开始导入</button>
            </div>
          </form>
          <div id="uploadMessage" class="message"></div>
        </section>

        <section class="panel panel--wide">
          <div class="panel-head">
            <h2>导入预览</h2>
          </div>
          <div id="previewContainer" class="preview-container">
            <p>请先上传 CSV 文件查看预览</p>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>确认导入</h2>
          </div>
          <div id="confirmContainer" class="confirm-container">
            <p>上传文件后，系统将自动解析并显示预览。确认无误后点击"确认导入"按钮。</p>
            <button id="confirmBtn" class="primary" disabled>确认导入</button>
          </div>
          <div id="confirmMessage" class="message"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
