<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BlindBox AI 审核管理</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">AstrBot Plugin Dashboard</p>
          <h1>BlindBox AI 审核管理</h1>
          <p class="lead">审核 AI 的任务审核结果，统一查看待确认的提交材料和审核意见。</p>
        </div>
        <div class="hero-card">
          <div class="hero-card-title">待审核统计</div>
          <div id="stats" class="stats"></div>
          <div class="hero-card-actions">
            <button id="refreshBtn" class="secondary">刷新</button>
          </div>
        </div>
      </header>

      <main class="grid">
        <section class="panel panel--wide">
          <div class="panel-head">
            <h2>待确认的提交</h2>
          </div>
          <div id="message" class="message"></div>
          <div id="reviews-container" class="reviews-container"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
